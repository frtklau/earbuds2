<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earbuds Scores</title>
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f0f0f0;
}

header {
    background: #0066cc;
    color: white;
    padding: 18px 16px;
    font-size: 20px;
    font-weight: bold;
    text-align: center;
}

#list {
    padding: 12px;
}

.card {
    background: white;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.card-left h3 {
    font-size: 16px;
    color: #111;
}

.card-left .price {
    font-size: 14px;
    color: #666;
    margin-top: 4px;
}

.card-right {
    text-align: right;
}

.card-right .score {
    font-size: 18px;
    font-weight: bold;
    color: #0066cc;
}

.card-right .label {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
}

.arrow {
    color: #ccc;
    font-size: 20px;
    margin-left: 8px;
}

#detail {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: white;
    overflow-y: auto;
    z-index: 100;
}

#detail header {
    display: flex;
    align-items: center;
    gap: 10px;
    text-align: left;
    font-size: 17px;
}

#back-btn {
    background: none;
    border: none;
    color: white;
    font-size: 22px;
    cursor: pointer;
    padding: 0 6px 0 0;
}

.detail-body {
    padding: 16px;
}

.detail-price {
    font-size: 15px;
    color: #888;
    margin-bottom: 16px;
}

.score-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 11px 0;
    border-bottom: 1px solid #eee;
}

.score-label {
    font-size: 15px;
    color: #333;
}

.score-val {
    font-size: 15px;
    font-weight: bold;
    color: #0066cc;
}

.total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 0;
    margin-top: 8px;
    border-bottom: 2px solid #0066cc;
}

.total-label {
    font-size: 16px;
    font-weight: bold;
    color: #111;
}

.total-val {
    font-size: 18px;
    font-weight: bold;
    color: #0066cc;
}
</style>
</head>
<body>

<div id="main-view">
    <header>Earbuds Scores</header>
    <div id="list">Loading spreadsheet data...</div>
</div>

<div id="detail">
    <header>
        <button id="back-btn" onclick="hideDetail()">‹</button>
        <span id="detail-title">Earbuds Detail</span>
    </header>
    <div class="detail-body">
        <div id="detail-price" class="detail-price">Price: --</div>
        <div id="detail-scores"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="app.js"></script>
</body>
</html>
